# Reference site archetypes — commercial web behavior patterns (not brand-specific rules).
# Used for: matrix docs, future fixtures, vertical-pack tuning, playbook targets, classifier stress tests.
version: 1
positioning: >-
  Anonymous Activation Intelligence: teach the engine what major commercial interaction models look like
  (visitor psychology, conversion mechanics, personalization levers) — not “hardcode rules for Jeep.”

archetypes:
  - id: apple_premium_ecosystem_commerce
    label: Premium consumer electronics ecosystem commerce
    representative_sites: [Apple.com]
    site_type: dtc_premium_commerce
    business_model: hardware_plus_services_subscriptions_accessories
    primary_objective: configure_and_purchase_high_consideration_devices
    secondary_objective: ecosystem_attachment_trade_in_financing
    typical_page_roles: [product_detail, compare, trade_in, financing, accessory_cross_sell, support_docs]
    common_conversion_paths:
      - explore_compare → configure → trade_in_estimate → finance → checkout
      - education_content → product → accessory_bundle
    common_personalization_needs:
      - help_me_choose_and_compare
      - trade_in_and_upgrade_prompts
      - ecosystem_bundle_surfacing
      - financing_clarity
    key_concepts:
      - Comparison shopping
      - Premium / quality seeking
      - Trust / proof seeking
      - Convenience / ease
    typical_ctas:
      hard: [Buy, Choose your model, Check out with Apple Pay, Trade in]
      soft: [Learn more, Which Mac is right for you, Watch film]
    typical_activation_surfaces: [pdp_sticky_cta, compare_modal, trade_in_inline, financing_disclosure_block]
    anonymous_visitor_patterns:
      - multi_model_compare_sessions
      - deep_scroll_on_specs
      - return_visits_before_configure
    engine_hints:
      suggested_vertical: ecommerce
      playbook_tuning: [generic_product_interest_no_cart, high_engagement_no_cta]
      fixture_priority: high

