# Deploy Worker + D1 migrations + Pages (snippet CDN, demo, dashboard) — requires GitHub secrets.
name: Cloudflare deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_SI_WORKER_URL: ${{ secrets.SI_WORKER_URL }}
      VITE_SI_SNIPPET_ORIGIN: ${{ secrets.VITE_SI_SNIPPET_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Require secrets
        run: |
          test -n "${CLOUDFLARE_API_TOKEN}" || { echo "Missing secret CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || { echo "Missing secret CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "${VITE_SI_WORKER_URL}" || { echo "Missing secret SI_WORKER_URL (Worker origin, no trailing slash)"; exit 1; }
          test -n "${D1_DATABASE_ID}" || { echo "Missing secret D1_DATABASE_ID"; exit 1; }
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Patch D1 id into worker/wrangler.toml
        run: node scripts/patch-d1.mjs
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Deploy Worker
        working-directory: worker
        run: pnpm exec wrangler deploy --env production

      - name: Build snippet CDN
        run: |
          export VITE_SI_SNIPPET_ORIGIN="${VITE_SI_SNIPPET_ORIGIN:-https://cdn.optiview.ai}"
          if [[ -z "${SI_PUBLIC_INSPECTOR_CSS_URL:-}" ]]; then
            export SI_PUBLIC_INSPECTOR_CSS_URL="${VITE_SI_SNIPPET_ORIGIN%/}/si-inspector.css"
          fi
          pnpm build:snippet

      - name: Pages — snippet CDN
        run: pnpm exec wrangler pages deploy --cwd apps/snippet-cdn --branch main --commit-dirty

      - name: Build Pages assets (demo + dashboard)
        run: |
          export VITE_SI_SNIPPET_ORIGIN="${VITE_SI_SNIPPET_ORIGIN:-https://cdn.optiview.ai}"
          export VITE_SI_DEMO_USE_HOSTED_SNIPPET=1
          export VITE_SI_DEMO_SNIPPET_INSPECTOR=1
          pnpm --filter @si/demo-retailer build
          pnpm --filter @si/dashboard build

      - name: Pages — demo retailer
        run: pnpm exec wrangler pages deploy --cwd apps/demo-retailer --branch main --commit-dirty

      - name: Pages — dashboard
        run: pnpm exec wrangler pages deploy --cwd apps/dashboard --branch main --commit-dirty
