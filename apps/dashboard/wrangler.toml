# Cloudflare Pages — Session Intelligence operator dashboard (static Vite build).
# Deploy from monorepo root after build, for example:
#   VITE_SI_WORKER_URL="https://<worker>.<subdomain>.workers.dev" pnpm --filter @si/dashboard build
