# Session Intelligence API — Cloudflare Worker + D1.
# Local: use worker/.dev.vars for dashboard bypass (see .dev.vars.example). Default [vars] are safe to deploy
# (no auth bypass). Production deploys MUST use:  wrangler deploy --env production
#
# Custom hostname (production): attach `api.optiview.ai` in the Cloudflare dashboard
# (Workers & Pages → session-intelligence-worker → Triggers → Custom Domains), or use Wrangler routes
# once your zone is linked. See docs/PRODUCTION_HOSTING.md — do not hardcode *.workers.dev in
# customer-facing snippets; bake `https://api.optiview.ai` via VITE_SI_WORKER_URL at snippet build time.
name = "session-intelligence-worker"
main = "src/index.ts"
compatibility_date = "2025-05-12"

# Uncomment if Wrangler cannot infer account (CI / multiple accounts):
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

# Default: local-oriented, no dashboard bypass (use .dev.vars for SI_BYPASS_DASHBOARD_AUTH=1).
[vars]
SI_DEPLOYMENT_MODE = "development"
SI_ENV = "dev"
SI_DASHBOARD_ORIGINS = "http://localhost:5174,http://127.0.0.1:5174"
SI_BYPASS_DASHBOARD_AUTH = "0"

[env.production.vars]
SI_DEPLOYMENT_MODE = "production"
SI_ENV = "production"
SI_BYPASS_DASHBOARD_AUTH = "0"
SI_DASHBOARD_ORIGINS = "https://dashboard.optiview.ai"

# Optional pre-production Worker (same codebase). Tune origins for your staging dashboard host.
# Deploy: wrangler deploy --env staging
[env.staging.vars]
SI_DEPLOYMENT_MODE = "staging"
SI_ENV = "staging"
SI_BYPASS_DASHBOARD_AUTH = "0"
SI_DASHBOARD_ORIGINS = "https://dashboard.optiview.ai"

# Optional: remote config overrides + collect rate limits (create KV in dashboard, then set id).
# [[kv_namespaces]]
# binding = "SI_KV"
# id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "SI_DB"
database_name = "session-intelligence"
database_id = "2c95a884-1363-4ca1-9977-0553054bbf3d"
migrations_dir = "db/migrations"
