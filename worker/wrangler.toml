# Session Intelligence API — Cloudflare Worker + D1.
# Local: keep a placeholder UUID below; Wrangler simulates D1. For production, run `pnpm cloudflare:up`
# or paste the id from `wrangler d1 create session-intelligence`.
name = "session-intelligence-worker"
main = "src/index.ts"
compatibility_date = "2025-05-12"

# Uncomment if Wrangler cannot infer account (CI / multiple accounts):
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[vars]
SI_ENV = "dev"

# Optional: remote config overrides + collect rate limits (create KV in dashboard, then set id).
# [[kv_namespaces]]
# binding = "SI_KV"
# id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "SI_DB"
database_name = "session-intelligence"
database_id = "2c95a884-1363-4ca1-9977-0553054bbf3d"
migrations_dir = "db/migrations"
